name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write  # 允许生成 OIDC token 用于 Trusted Publishing
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for Trusted Publishing
        run: npm i -g npm@^11.5.1

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      - name: Pack
        run: npm pack

      - name: Publish (via Trusted Publishing)
        run: npm publish --access public --provenance

      # 自动创建 GitHub Release 并上传 npm pack 产物
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: '*.tgz'
