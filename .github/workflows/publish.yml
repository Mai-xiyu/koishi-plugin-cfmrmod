name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      - name: Resolve Package Info
        run: |
          echo "PKG_NAME=$(npm pkg get name | tr -d '\"')" >> "$GITHUB_ENV"
          echo "PKG_VERSION=$(npm pkg get version | tr -d '\"')" >> "$GITHUB_ENV"

      - name: Pack
        run: npm pack

      - name: Publish (Skip If Exists)
        run: |
          if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "${PKG_NAME}@${PKG_VERSION} already exists on npm, skip publish."
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # 自动创建 GitHub Release 并上传 npm pack 产物
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: '*.tgz'
